{% extends 'landing/base.html' %}

{% block title %}Contact — Toki{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <h2 class="mb-3">Contact</h2>
    <p class="text-muted">Have a question or want to work together? Send a short message.</p>
    <form method="post" class="mt-4">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success">Send</button>
    </form>
  </div>
</section>
{% endblock %}
