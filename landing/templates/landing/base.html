{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Toki{% endblock %}</title>

    <link rel="icon" type="image/x-icon" href="{% static 'landing/images/birds.png' %}">
    <link rel="stylesheet" href="{% static 'landing/css/styles.css' %}">
  </head>

  <body>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="/">
          <img src="{% static 'landing/images/birds.png' %}" alt="Birds" class="brand-logo">
          <span class="brand-text">Toki</span>
        </a>
        <nav class="nav">
          <a href="/about/">About</a>
          <a href="/contact/">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© Toki — Simple conversations, always online.</div>
    </footer>
  </body>
</html>
