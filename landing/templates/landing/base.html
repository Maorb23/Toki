{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Toki — human-first conversational services: simple, reliable, always online">
    <title>{% block title %}Toki{% endblock %}</title>

    <link rel="icon" type="image/x-icon" href="{% static 'landing/images/birds.png' %}">
    <link rel="apple-touch-icon" href="{% static 'landing/images/birds.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'landing/css/styles.css' %}">
  </head>

  <body>
    <header class="site-header">
      <nav class="navbar navbar-expand-lg bg-white border-bottom position-relative" role="navigation" aria-label="Main navigation">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <img src="{% static 'landing/images/birds.png' %}" alt="Toki logo" class="brand-logo">
            <span class="brand-text">Toki</span>
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
              <li class="nav-item"><a class="nav-link" href="/about/">About</a></li>
              <li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main role="main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer bg-white border-top">
      <div class="container py-4">
        <div class="row align-items-center">
          <div class="col-md-6 text-center text-md-start">
            <small class="text-muted">© {{ now|date:"Y" }} Toki — Simple conversations, always online.</small>
          </div>
          <div class="col-md-6 text-center text-md-end">
            <a class="text-muted me-3" href="/privacy/">Privacy</a>
            <a class="text-muted" href="/terms/">Terms</a>
          </div>
        </div>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  </body>
</html>
